#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - openssl
  - rsync
  - ufw

write_files:
  - path: /etc/sysctl.d/99-continuous.conf
    permissions: "0644"
    content: |
      vm.swappiness=10

runcmd:
  - [sh, -lc, "sysctl --system"]
  - [sh, -lc, "if [ ! -f /swapfile ]; then fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile && echo '/swapfile none swap sw 0 0' >> /etc/fstab; fi"]
  - [sh, -lc, "install -m 0755 -d /etc/apt/keyrings"]
  - [sh, -lc, "curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc"]
  - [sh, -lc, "chmod a+r /etc/apt/keyrings/docker.asc"]
  - [sh, -lc, "echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable\" > /etc/apt/sources.list.d/docker.list"]
  - [sh, -lc, "apt-get update"]
  - [sh, -lc, "apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin"]
  - [sh, -lc, "systemctl enable --now docker"]
  - [sh, -lc, "mkdir -p /opt/continuous && chmod 755 /opt/continuous"]
  - [sh, -lc, "ufw allow OpenSSH && ufw allow 80/tcp && ufw allow 443/tcp && ufw --force enable"]
