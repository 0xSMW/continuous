name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_ENV: test
  NEXT_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://postgres@127.0.0.1:5432/continuous_test
  DIRECT_URL: postgresql://postgres@127.0.0.1:5432/continuous_test
  POSTGRES_URL: postgresql://postgres@127.0.0.1:5432/continuous_test
  EXPECTED_POSTGRES_MAJOR: 17

jobs:
  verify:
    name: Install, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: continuous_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d continuous_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Postgres parity
        run: bun run db:version-check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
