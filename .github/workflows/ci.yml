name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_ENV: test
  NEXT_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/continuous_test
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/continuous_test
  POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/continuous_test

jobs:
  verify:
    name: Install, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: continuous_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d continuous_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f package.json ]]; then
            echo "::error file=package.json::CI expects a root package.json with lint, typecheck, test, and build scripts."
            exit 1
          fi

          if [[ -f pnpm-lock.yaml ]]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "runner=pnpm" >> "$GITHUB_OUTPUT"
          elif [[ -f yarn.lock ]]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --immutable" >> "$GITHUB_OUTPUT"
            echo "runner=yarn" >> "$GITHUB_OUTPUT"
          elif [[ -f package-lock.json ]]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "runner=npm" >> "$GITHUB_OUTPUT"
          elif [[ -f bun.lock || -f bun.lockb ]]; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
            echo "lockfile=bun.lock" >> "$GITHUB_OUTPUT"
            echo "install=bun install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "runner=bun" >> "$GITHUB_OUTPUT"
          else
            echo "::error::CI requires a committed lockfile: pnpm-lock.yaml, yarn.lock, package-lock.json, bun.lock, or bun.lockb."
            exit 1
          fi

      - name: Setup Node.js
        if: steps.pm.outputs.manager != 'bun'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ steps.pm.outputs.manager }}
          cache-dependency-path: ${{ steps.pm.outputs.lockfile }}

      - name: Setup Bun
        if: steps.pm.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable Corepack
        if: steps.pm.outputs.manager == 'pnpm' || steps.pm.outputs.manager == 'yarn'
        run: corepack enable

      - name: Setup npm
        if: steps.pm.outputs.manager == 'npm'
        run: npm install --global npm@11

      - name: Install dependencies
        run: ${{ steps.pm.outputs.install }}

      - name: Lint
        run: ${{ steps.pm.outputs.runner }} run lint

      - name: Typecheck
        run: ${{ steps.pm.outputs.runner }} run typecheck

      - name: Test
        run: ${{ steps.pm.outputs.runner }} run test

      - name: Build
        run: ${{ steps.pm.outputs.runner }} run build
