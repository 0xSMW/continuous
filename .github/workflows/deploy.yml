name: Deploy

on:
  workflow_dispatch:
    inputs:
      site_hosts:
        description: "Caddy site hosts, for example continuoushq.com, getcontinuous.app"
        required: false
        default: "continuoushq.com, getcontinuous.app"
      app_url:
        description: "Canonical external app URL; omitted values derive from the first site host"
        required: false
        default: ""
      app_tag:
        description: "Release image tag to deploy; omitted values use sha-<current commit>"
        required: false
        default: ""
      rollback_app_tag:
        description: "Existing image tag to roll app services back to without running migrations"
        required: false
        default: ""
      require_production_readiness:
        description: "Run the strict customer-data readiness gate after deploy smoke"
        required: false
        default: "true"

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  droplet:
    name: DigitalOcean Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'continuous-deploy' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/continuous' }}
      SITE_HOSTS: ${{ inputs.site_hosts }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL || 'admin@continuoushq.com' }}
      APP_URL: ${{ inputs.app_url }}
      APP_TAG_INPUT: ${{ inputs.app_tag }}
      ROLLBACK_APP_TAG: ${{ inputs.rollback_app_tag }}
      REQUIRE_PRODUCTION_READINESS: ${{ inputs.require_production_readiness }}
      WORKER_OPERATOR_EMAIL: ${{ secrets.WORKER_OPERATOR_EMAIL }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      DO_FIREWALL_NAME: continuous-fw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST:-}" ]]; then
            echo "::error::Missing DEPLOY_HOST secret."
            exit 1
          fi
          if [[ -z "${DEPLOY_KEY:-}" ]]; then
            echo "::error::Missing DEPLOY_KEY secret."
            exit 1
          fi
          if [[ -z "${DO_API_TOKEN:-}" ]]; then
            echo "::error::Missing DO_API_TOKEN secret."
            exit 1
          fi
          if [[ -z "${WORKER_OPERATOR_EMAIL:-}" ]]; then
            echo "::error::Missing WORKER_OPERATOR_EMAIL secret."
            exit 1
          fi

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SITE_HOSTS" =~ ^[A-Za-z0-9.,[:space:]-]+$ ]]; then
            echo "::error::site_hosts may only contain hostnames, commas, spaces, dots, and dashes."
            exit 1
          fi
          if [[ -n "${APP_URL:-}" && ! "$APP_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "::error::app_url must be an https URL."
            exit 1
          fi
          if [[ -n "${APP_TAG_INPUT:-}" && ! "$APP_TAG_INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::app_tag may only contain letters, numbers, dot, underscore, or dash."
            exit 1
          fi
          if [[ -n "${ROLLBACK_APP_TAG:-}" && ! "$ROLLBACK_APP_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::rollback_app_tag may only contain letters, numbers, dot, underscore, or dash."
            exit 1
          fi
          if [[ "$REQUIRE_PRODUCTION_READINESS" != "true" && "$REQUIRE_PRODUCTION_READINESS" != "false" ]]; then
            echo "::error::require_production_readiness must be true or false."
            exit 1
          fi
          if [[ "$REQUIRE_PRODUCTION_READINESS" == "true" && "$DEPLOY_USER" == "root" ]]; then
            echo "::error::require_production_readiness=true requires DEPLOY_USER to be a non-root deploy account."
            exit 1
          fi

      - name: Check CI for release SHA
        if: ${{ inputs.rollback_app_tag == '' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ci_runs="$(
            curl -fsS \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&status=completed&per_page=20"
          )"
          if ! printf '%s\n' "$ci_runs" | jq -e '.workflow_runs | any(.conclusion == "success")' >/dev/null; then
            echo "::error::No successful CI run found for ${GITHUB_SHA}. Run CI for this exact commit before deploying."
            printf '%s\n' "$ci_runs" | jq -c '.workflow_runs[]? | {id, status, conclusion, html_url}'
            exit 1
          fi
          printf '%s\n' "$ci_runs" | jq -c '.workflow_runs[] | select(.conclusion == "success") | {id, conclusion, html_url}' | head -1

      - name: Prepare release image tag
        shell: bash
        run: |
          set -euo pipefail
          app_tag="${APP_TAG_INPUT:-sha-${GITHUB_SHA::12}}"
          archive="$RUNNER_TEMP/continuous-images-$app_tag.tar.gz"

          echo "RELEASE_APP_TAG=$app_tag" >> "$GITHUB_ENV"
          echo "RELEASE_IMAGE_ARCHIVE=$archive" >> "$GITHUB_ENV"
          echo "RELEASE_IMAGE_ARCHIVE_NAME=$(basename "$archive")" >> "$GITHUB_ENV"

      - name: Build release images
        if: ${{ inputs.rollback_app_tag == '' }}
        shell: bash
        run: |
          set -euo pipefail
          APP_IMAGE="continuous-app" \
            APP_TAG="$RELEASE_APP_TAG" \
            APP_REVISION="$GITHUB_SHA" \
            APP_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            RELEASE_IMAGE_ARCHIVE="$RELEASE_IMAGE_ARCHIVE" \
            ./scripts/build-release-images.sh

          release_sha="$(awk '{print $1}' "$RELEASE_IMAGE_ARCHIVE.sha256")"
          echo "RELEASE_IMAGE_SHA256=$release_sha" >> "$GITHUB_ENV"

      - name: Open runner SSH access
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -4 -fsS https://ifconfig.me/ip)"
          firewall_id="$(
            curl -fsS \
              -H "Authorization: Bearer $DO_API_TOKEN" \
              "https://api.digitalocean.com/v2/firewalls" \
              | jq -r --arg name "$DO_FIREWALL_NAME" '.firewalls[] | select(.name == $name) | .id' \
              | head -1
          )"
          if [[ -z "$firewall_id" ]]; then
            echo "::error::Could not find DigitalOcean firewall $DO_FIREWALL_NAME."
            exit 1
          fi

          echo "RUNNER_SSH_CIDR=$runner_ip/32" >> "$GITHUB_ENV"
          echo "DO_FIREWALL_ID=$firewall_id" >> "$GITHUB_ENV"

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$runner_ip/32\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$firewall_id/rules" \
            >/dev/null

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 5 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH did not become reachable from this runner."
          exit 1

      - name: Prepare remote release storage
        if: ${{ inputs.rollback_app_tag == '' }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' APP_IMAGE='continuous-app' APP_TAG='$RELEASE_APP_TAG' bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$APP_DIR/releases"

          current_app_tag=""
          previous_app_tag=""
          if [ -f "$APP_DIR/.env" ]; then
            current_app_tag="$(grep '^APP_TAG=' "$APP_DIR/.env" | cut -d= -f2- || true)"
            previous_app_tag="$(grep '^PREVIOUS_APP_TAG=' "$APP_DIR/.env" | cut -d= -f2- || true)"
          fi

          echo "Remote disk before release cleanup:"
          df -h / "$APP_DIR" /var/lib/docker 2>/dev/null || df -h /

          if command -v docker >/dev/null 2>&1; then
            run_cleanup() {
              if command -v timeout >/dev/null 2>&1; then
                timeout --preserve-status 120s "$@" >/dev/null 2>&1 || true
              else
                "$@" >/dev/null 2>&1 || true
              fi
            }
            prune_old_app_images() {
              docker images "$APP_IMAGE" --format '{{.Repository}} {{.Tag}}' | while read -r image_repo image_tag; do
                if [ -z "$image_repo" ] || [ -z "$image_tag" ] || [ "$image_tag" = "<none>" ]; then
                  continue
                fi

                keep_image=false
                case "$image_tag" in
                  "$APP_TAG"|"$APP_TAG-migrate"|"$APP_TAG-scheduler")
                    keep_image=true
                    ;;
                esac
                if [ -n "$current_app_tag" ]; then
                  case "$image_tag" in
                    "$current_app_tag"|"$current_app_tag-migrate"|"$current_app_tag-scheduler")
                      keep_image=true
                      ;;
                  esac
                fi
                if [ -n "$previous_app_tag" ]; then
                  case "$image_tag" in
                    "$previous_app_tag"|"$previous_app_tag-migrate"|"$previous_app_tag-scheduler")
                      keep_image=true
                      ;;
                  esac
                fi

                if [ "$keep_image" = false ]; then
                  run_cleanup docker image rm "$image_repo:$image_tag"
                fi
              done
            }
            run_cleanup docker container prune -f
            run_cleanup docker image prune -f
            run_cleanup docker builder prune -af
            prune_old_app_images
          fi

          if [ -d "$APP_DIR/releases" ]; then
            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r release_dir; do
              release_name="$(basename "$release_dir")"
              case "$release_name" in
                "$APP_TAG"|"$current_app_tag"|"$previous_app_tag")
                  ;;
                *)
                  rm -rf "$release_dir"
                  ;;
              esac
            done
            find "$APP_DIR/releases" -mindepth 2 -maxdepth 2 -type f ! -path "$APP_DIR/releases/$APP_TAG/*" -delete 2>/dev/null || true
          fi

          echo "Remote disk after release cleanup:"
          df -h / "$APP_DIR" /var/lib/docker 2>/dev/null || df -h /
          du -sh "$APP_DIR/releases" 2>/dev/null || true
          REMOTE

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$REQUIRE_PRODUCTION_READINESS" == "true" ]]; then
            remote_uid="$(
              ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "id -u"
            )"
            if [[ "$remote_uid" == "0" ]]; then
              echo "::error::require_production_readiness=true requires the remote deploy session to run as non-root."
              exit 1
            fi
          fi
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cloud-init status --wait >/dev/null 2>&1 || true; command -v docker >/dev/null; docker compose version >/dev/null; command -v rsync >/dev/null; command -v jq >/dev/null; command -v curl >/dev/null; command -v sha256sum >/dev/null; command -v base64 >/dev/null; command -v openssl >/dev/null; mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "/backups/" \
            --exclude "/logs/" \
            --exclude "/reports/recovery-drills/" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Preflight production readiness gate
        if: ${{ inputs.require_production_readiness == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && ./scripts/check-production-readiness-on-host.sh"

      - name: Upload release images
        if: ${{ inputs.rollback_app_tag == '' }}
        shell: bash
        run: |
          set -euo pipefail
          remote_dir="$DEPLOY_PATH/releases/$RELEASE_APP_TAG"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$remote_dir'"
          timeout --preserve-status 10m rsync -az --partial --timeout=60 --info=name,stats2 \
            -e "ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
            "$RELEASE_IMAGE_ARCHIVE" \
            "$RELEASE_IMAGE_ARCHIVE.sha256" \
            "$RELEASE_IMAGE_ARCHIVE.manifest.json" \
            "$DEPLOY_USER@$DEPLOY_HOST:$remote_dir/"

      - name: Deploy Compose stack
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SITE_HOSTS:-}" || "$SITE_HOSTS" == "http://:80" || "$SITE_HOSTS" == ":80" ]]; then
            SITE_HOSTS="continuoushq.com, getcontinuous.app"
          fi
          if [[ -z "${APP_URL:-}" ]]; then
            first_host="$(printf '%s' "$SITE_HOSTS" | cut -d, -f1 | xargs)"
            first_host="${first_host#http://}"
            first_host="${first_host#https://}"
            APP_URL="https://$first_host"
          fi
          if [[ "$APP_URL" == http://* ]]; then
            echo "::error::app_url must be an https URL."
            exit 1
          fi
          app_url="${APP_URL:-https://continuoushq.com}"
          site_host="${app_url#https://}"
          site_host="${site_host%%/*}"
          site_host="${site_host%%:*}"
          app_tag="${RELEASE_APP_TAG:-${APP_TAG_INPUT:-sha-${GITHUB_SHA::12}}}"
          release_image_archive_remote=""
          release_image_sha="${RELEASE_IMAGE_SHA256:-}"
          if [[ -z "${ROLLBACK_APP_TAG:-}" ]]; then
            release_image_archive_remote="$DEPLOY_PATH/releases/$app_tag/$RELEASE_IMAGE_ARCHIVE_NAME"
          fi
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' SITE_HOSTS='$SITE_HOSTS' SITE_HOST='$site_host' ACME_EMAIL='$ACME_EMAIL' APP_URL='$app_url' WORKER_OPERATOR_EMAIL='$WORKER_OPERATOR_EMAIL' APP_IMAGE='continuous-app' APP_TAG='$app_tag' ROLLBACK_APP_TAG='$ROLLBACK_APP_TAG' RELEASE_IMAGE_ARCHIVE='$release_image_archive_remote' RELEASE_IMAGE_SHA256='$release_image_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          install -m 0755 -d logs/caddy logs/observability
          if [ -n "${ROLLBACK_APP_TAG:-}" ] && [ ! -f .env ]; then
            echo "Missing $APP_DIR/.env; cannot roll back app services." >&2
            exit 1
          fi

          if [ ! -f .env ]; then
            password="$(openssl rand -hex 32)"
            umask 077
            {
              printf 'POSTGRES_DB=continuous\n'
              printf 'POSTGRES_USER=continuous\n'
              printf 'POSTGRES_PASSWORD=%s\n' "$password"
              printf 'DATABASE_URL=postgresql://continuous:%s@db:5432/continuous\n' "$password"
              printf 'APP_ENV=production\n'
              printf 'APP_URL=%s\n' "$APP_URL"
              printf 'SITE_HOSTS=%s\n' "$SITE_HOSTS"
              printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL"
              printf 'APP_IMAGE=%s\n' "$APP_IMAGE"
              printf 'APP_TAG=%s\n' "$APP_TAG"
              printf 'WORKER_RUN_ENABLED=true\n'
              printf 'WORKER_RUN_TOKEN=%s\n' "$(openssl rand -hex 32)"
              printf 'WORKER_OPERATOR_EMAIL=%s\n' "$WORKER_OPERATOR_EMAIL"
              printf 'CONTROL_PLANE_ALLOWED_TENANTS=continuous-demo\n'
              printf 'CONTROL_PLANE_ALLOWED_WORKER_ROLES=revenue_operations,owner_chief_of_staff,dispatch_operations,finance_operations,workforce_operations,compliance_operations,systems_operations,offer_pricing_operations,customer_experience_operations,growth_operations\n'
              printf 'WORKER_SCHEDULER_ENABLED=true\n'
              printf 'WORKER_SCHEDULER_BASE_URL=http://app:3000\n'
              printf 'WORKER_SCHEDULER_TENANT_SLUG=continuous-demo\n'
              printf 'WORKER_SCHEDULER_LEAD_POLL_LIMIT=5\n'
            } > .env
          fi
          set_env() {
            key="$1"
            value="$2"
            tmp="$(mktemp)"
            if grep -q "^${key}=" .env; then
              awk -v key="$key" -v value="$value" '
                index($0, key "=") == 1 { print key "=" value; next }
                { print }
              ' .env > "$tmp"
            else
              cat .env > "$tmp"
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
            fi
            mv "$tmp" .env
            chmod 600 .env
          }
          set_control_plane_token_catalog() {
            token_hash="$(printf '%s' "$worker_token" | sha256sum | awk '{print $1}')"
            allowed_commands='"core:view.summary","core:view.ledger","core:task.create","core:task.transition","core:object.upsert","core:adapter.upsert","core:connection.upsert","core:connection.health.record","core:entity.setup.record","core:worker.upsert","core:worker.transition","core:worker.run.start","core:worker.run.complete","core:object.link","core:event.ingest","core:evidence.attach","core:document.create","core:packet.prepare","core:document.packet.prepare","core:decision.record","core:approval.request","core:adapter.intent.record","core:rule.change.record","core:obligation.scan","core:external_action.record","core:capability.grant","core:budget.reserve","core:budget.charge","core:budget.release","core:ai.infer","core:view.publish","core:customer_signal.record","core:payroll.preview.record","core:payroll.preview.packet.prepare","core:control_plane.token_rotation.attest","core:control_plane.credential.upsert","core:control_plane.credential.revoke","core:control_plane.session.review","worker:view.snapshot","worker:view.approvals","worker:view.briefs","worker:view.decisions","worker:view.board","worker:view.exceptions","worker:view.readiness","worker:view.health","worker:view.repairs","worker:view.price_policy","worker:view.signals","worker:view.campaigns","worker:run","worker:lead.read","worker:lead.classify","worker:response.draft","worker:quote.prepare","worker:payment_link.prepare","worker:schedule.propose","worker:customer_update.draft","worker:closeout.prepare","worker:exception.route","worker:invoice.prepare","worker:ar_followup.draft","worker:cash_forecast.generate","worker:payment_draft.prepare","worker:hire.packet.prepare","worker:payroll_input.prepare","worker:continue","worker:approval.decide","worker:adapters.reconcile","worker:adapters.retry","worker:brief.generate","worker:decision_queue.prepare","worker:anomaly.triage","worker:connector.health.scan","worker:sync.repair.plan","worker:data_quality.remediate","worker:permission.review","worker:automation.plan","worker:margin.review.prepare","worker:recovery.draft","worker:campaign.draft","workflow:view.overview","workflow:view.approvals","workflow:start","workflow:transition","workflow:steps.execute","workflow:approval.decide","approval:view.inbox","approval:approval.decide"'
            compliance_worker_permissions='"worker:view.obligations","worker:view.packet","worker:filing.prepare"'
            app_server_commands='"app_server:worker.schema","app_server:worker.view.snapshot","app_server:worker.view.approvals","app_server:worker.view.briefs","app_server:worker.view.decisions","app_server:worker.view.board","app_server:worker.view.exceptions","app_server:worker.view.readiness","app_server:worker.view.health","app_server:worker.view.repairs","app_server:worker.view.price_policy","app_server:worker.view.signals","app_server:worker.view.campaigns","app_server:worker.command.run","app_server:worker.command.lead.read","app_server:worker.command.lead.classify","app_server:worker.command.response.draft","app_server:worker.command.quote.prepare","app_server:worker.command.payment_link.prepare","app_server:worker.command.schedule.propose","app_server:worker.command.customer_update.draft","app_server:worker.command.closeout.prepare","app_server:worker.command.exception.route","app_server:worker.command.invoice.prepare","app_server:worker.command.ar_followup.draft","app_server:worker.command.cash_forecast.generate","app_server:worker.command.payment_draft.prepare","app_server:worker.command.hire.packet.prepare","app_server:worker.command.payroll_input.prepare","app_server:worker.command.continue","app_server:worker.command.approval.decide","app_server:worker.command.adapters.reconcile","app_server:worker.command.adapters.retry","app_server:worker.command.brief.generate","app_server:worker.command.decision_queue.prepare","app_server:worker.command.anomaly.triage","app_server:worker.command.connector.health.scan","app_server:worker.command.sync.repair.plan","app_server:worker.command.data_quality.remediate","app_server:worker.command.permission.review","app_server:worker.command.automation.plan","app_server:worker.command.margin.review.prepare","app_server:worker.command.recovery.draft","app_server:worker.command.campaign.draft"'
            core_app_server_commands='"app_server:core.schema","app_server:core.view.summary","app_server:core.view.ledger","app_server:core.command.task.create","app_server:core.command.task.transition","app_server:core.command.object.upsert","app_server:core.command.adapter.upsert","app_server:core.command.connection.upsert","app_server:core.command.connection.health.record","app_server:core.command.entity.setup.record","app_server:core.command.worker.upsert","app_server:core.command.worker.transition","app_server:core.command.worker.run.start","app_server:core.command.worker.run.complete","app_server:core.command.object.link","app_server:core.command.event.ingest","app_server:core.command.evidence.attach","app_server:core.command.document.create","app_server:core.command.packet.prepare","app_server:core.command.document.packet.prepare","app_server:core.command.decision.record","app_server:core.command.approval.request","app_server:core.command.adapter.intent.record","app_server:core.command.rule.change.record","app_server:core.command.obligation.scan","app_server:core.command.external_action.record","app_server:core.command.capability.grant","app_server:core.command.budget.reserve","app_server:core.command.budget.charge","app_server:core.command.budget.release","app_server:core.command.ai.infer","app_server:core.command.view.publish","app_server:core.command.customer_signal.record","app_server:core.command.payroll.preview.record","app_server:core.command.payroll.preview.packet.prepare"'
            control_app_server_commands='"app_server:workflow.schema","app_server:workflow.view.overview","app_server:workflow.view.approvals","app_server:workflow.command.start","app_server:workflow.command.transition","app_server:workflow.command.steps.execute","app_server:workflow.command.approval.decide","app_server:approval.schema","app_server:approval.view.inbox","app_server:approval.command.approval.decide"'
            compliance_app_server_permissions='"app_server:worker.view.obligations","app_server:worker.view.packet","app_server:worker.command.filing.prepare"'
            allowed_commands="${allowed_commands},${compliance_worker_permissions},${app_server_commands},${core_app_server_commands},${control_app_server_commands},${compliance_app_server_permissions}"
            catalog_json="$(
              printf '[{"id":"bootstrap-operator","tokenSha256":"%s","operatorEmail":"%s","allowedTenants":["continuous-demo"],"allowedWorkerRoles":["revenue_operations","owner_chief_of_staff","dispatch_operations","finance_operations","workforce_operations","compliance_operations","systems_operations","offer_pricing_operations","customer_experience_operations","growth_operations"],"allowedRoutes":["core","worker","workflow","approval","app_server"],"allowedAccess":["read","write"],"allowedCommands":[%s]}]' \
                "$token_hash" \
                "$WORKER_OPERATOR_EMAIL" \
                "$allowed_commands"
            )"
            catalog_b64="$(printf '%s' "$catalog_json" | base64 -w0)"

            set_env CONTROL_PLANE_TOKENS_JSON ""
            set_env CONTROL_PLANE_TOKEN_CATALOG_B64 "$catalog_b64"
          }
          cleanup_release_storage() {
            mkdir -p "$APP_DIR/releases"
            current_app_tag="$(grep '^APP_TAG=' .env | cut -d= -f2- || true)"
            previous_app_tag="$(grep '^PREVIOUS_APP_TAG=' .env | cut -d= -f2- || true)"

            echo "Remote disk before image load cleanup:"
            df -h / "$APP_DIR" /var/lib/docker 2>/dev/null || df -h /
            docker system df || true

            run_cleanup() {
              if command -v timeout >/dev/null 2>&1; then
                timeout --preserve-status 120s "$@" >/dev/null 2>&1 || true
              else
                "$@" >/dev/null 2>&1 || true
              fi
            }
            prune_old_app_images() {
              docker images "$APP_IMAGE" --format '{{.Repository}} {{.Tag}}' | while read -r image_repo image_tag; do
                if [ -z "$image_repo" ] || [ -z "$image_tag" ] || [ "$image_tag" = "<none>" ]; then
                  continue
                fi

                keep_image=false
                case "$image_tag" in
                  "$APP_TAG"|"$APP_TAG-migrate"|"$APP_TAG-scheduler")
                    keep_image=true
                    ;;
                esac
                if [ -n "$current_app_tag" ]; then
                  case "$image_tag" in
                    "$current_app_tag"|"$current_app_tag-migrate"|"$current_app_tag-scheduler")
                      keep_image=true
                      ;;
                  esac
                fi
                if [ -n "$previous_app_tag" ]; then
                  case "$image_tag" in
                    "$previous_app_tag"|"$previous_app_tag-migrate"|"$previous_app_tag-scheduler")
                      keep_image=true
                      ;;
                  esac
                fi

                if [ "$keep_image" = false ]; then
                  run_cleanup docker image rm "$image_repo:$image_tag"
                fi
              done
            }
            run_cleanup docker container prune -f
            run_cleanup docker image prune -f
            run_cleanup docker builder prune -af
            prune_old_app_images
            find /var/lib/docker/containers -type f -name '*-json.log' -exec truncate -s 0 {} + 2>/dev/null || true
            find "$APP_DIR/releases" -mindepth 2 -maxdepth 2 -type f ! -path "$APP_DIR/releases/$APP_TAG/*" -delete 2>/dev/null || true

            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r release_dir; do
              release_name="$(basename "$release_dir")"
              case "$release_name" in
                "$APP_TAG"|"$current_app_tag"|"$previous_app_tag")
                  ;;
                *)
                  rm -rf "$release_dir"
                  ;;
              esac
            done

            echo "Remote disk after image load cleanup:"
            df -h / "$APP_DIR" /var/lib/docker 2>/dev/null || df -h /
            docker system df || true
            du -sh "$APP_DIR/releases" 2>/dev/null || true
          }
          if [ -n "${ROLLBACK_APP_TAG:-}" ]; then
            app_image="$(grep '^APP_IMAGE=' .env | cut -d= -f2- || true)"
            app_image="${app_image:-continuous-app}"
            current_app_tag="$(grep '^APP_TAG=' .env | cut -d= -f2- || true)"
            docker image inspect "$app_image:$ROLLBACK_APP_TAG" >/dev/null
            docker image inspect "$app_image:$ROLLBACK_APP_TAG-scheduler" >/dev/null
            if [ -n "$current_app_tag" ] && [ "$current_app_tag" != "$ROLLBACK_APP_TAG" ]; then
              set_env PREVIOUS_APP_TAG "$current_app_tag"
            fi
            set_env APP_IMAGE "$app_image"
            set_env APP_TAG "$ROLLBACK_APP_TAG"
            docker compose --profile scheduler up -d --no-build --no-deps app worker-scheduler
            for attempt in $(seq 1 30); do
              if docker compose exec -T app node -e "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))" </dev/null; then
                docker compose --profile scheduler ps app worker-scheduler
                exit 0
              fi
              sleep 5
            done
            echo "App did not become healthy after rollback to $ROLLBACK_APP_TAG." >&2
            docker compose --profile scheduler ps app worker-scheduler >&2
            exit 1
          fi
          if [ -z "${ROLLBACK_APP_TAG:-}" ]; then
            if [ -z "${RELEASE_IMAGE_ARCHIVE:-}" ] || [ ! -f "$RELEASE_IMAGE_ARCHIVE" ]; then
              echo "Missing release image archive for $APP_TAG at $RELEASE_IMAGE_ARCHIVE." >&2
              exit 1
            fi
            if [ -z "${RELEASE_IMAGE_SHA256:-}" ]; then
              echo "Missing expected release image archive checksum for $APP_TAG." >&2
              exit 1
            fi
            actual_release_sha="$(sha256sum "$RELEASE_IMAGE_ARCHIVE" | awk '{print $1}')"
            if [ "$actual_release_sha" != "$RELEASE_IMAGE_SHA256" ]; then
              echo "Release image archive checksum mismatch for $RELEASE_IMAGE_ARCHIVE." >&2
              echo "expected=$RELEASE_IMAGE_SHA256 actual=$actual_release_sha" >&2
              exit 1
            fi
            gzip -t "$RELEASE_IMAGE_ARCHIVE"
            cleanup_release_storage
            docker load -i "$RELEASE_IMAGE_ARCHIVE"
            docker image inspect "$APP_IMAGE:$APP_TAG" >/dev/null
            docker image inspect "$APP_IMAGE:$APP_TAG-migrate" >/dev/null
            docker image inspect "$APP_IMAGE:$APP_TAG-scheduler" >/dev/null
            echo "Loaded release images for $APP_IMAGE:$APP_TAG from $RELEASE_IMAGE_ARCHIVE."
          fi
          set_env APP_URL "$APP_URL"
          set_env SITE_HOSTS "$SITE_HOSTS"
          set_env ACME_EMAIL "$ACME_EMAIL"
          set_env WORKER_OPERATOR_EMAIL "$WORKER_OPERATOR_EMAIL"
          set_env CONTROL_PLANE_ALLOWED_TENANTS "continuous-demo"
          set_env CONTROL_PLANE_ALLOWED_WORKER_ROLES "revenue_operations,owner_chief_of_staff,dispatch_operations,finance_operations,workforce_operations,compliance_operations,systems_operations,offer_pricing_operations,customer_experience_operations,growth_operations"
          set_env WORKER_SCHEDULER_ENABLED true
          set_env WORKER_SCHEDULER_BASE_URL "http://app:3000"
          set_env WORKER_SCHEDULER_TENANT_SLUG "continuous-demo"
          set_env WORKER_SCHEDULER_LEAD_POLL_LIMIT 5
          current_app_tag="$(grep '^APP_TAG=' .env | cut -d= -f2- || true)"
          set_env APP_IMAGE "$APP_IMAGE"
          if [ -n "$current_app_tag" ] && [ "$current_app_tag" != "$APP_TAG" ]; then
            set_env PREVIOUS_APP_TAG "$current_app_tag"
          fi
          set_env APP_TAG "$APP_TAG"
          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          export POSTGRES_USER POSTGRES_DB
          previous_worker_token="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"
          worker_token="$(openssl rand -hex 32)"
          if [ -n "$previous_worker_token" ] && docker compose ps --status running app | grep -q app; then
            TOKEN_ROTATION_OUTPUT=""
            if TOKEN_ROTATION_OUTPUT="$(
              APP_DIR="$APP_DIR" \
                SITE_HOST="$SITE_HOST" \
                NEXT_WORKER_RUN_TOKEN="$worker_token" \
                CONTROL_PLANE_ROTATION_RUN_ID="$(date -u +%Y%m%d%H%M%S)" \
                "$APP_DIR/scripts/rotate-control-plane-token-on-host.sh"
            )" && printf '%s\n' "$TOKEN_ROTATION_OUTPUT" | /usr/bin/jq -e \
              '.control_plane_token_rotation_status == "ok" and (.tokenRotationAttestationId | length > 0)' \
              >/dev/null; then
              printf '%s\n' "$TOKEN_ROTATION_OUTPUT"
            else
              if [ -n "$TOKEN_ROTATION_OUTPUT" ]; then
                printf '%s\n' "$TOKEN_ROTATION_OUTPUT" >&2
              fi
              echo "Pre-deploy token rotation could not be attested; preserving the existing bootstrap token while retaining the catalog for this recovery deploy." >&2
              worker_token="$previous_worker_token"
            fi
          else
            echo "No running app found for pre-deploy token rotation; writing a fresh bootstrap token and seeding the route-scoped catalog."
          fi
          set_env WORKER_RUN_TOKEN "$worker_token"
          set_env WORKER_RUN_ENABLED true
          set_control_plane_token_catalog
          docker compose pull db caddy
          docker compose up -d db
          db_ready=false
          for attempt in $(seq 1 60); do
            if docker compose exec -T db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' </dev/null; then
              db_ready=true
              break
            fi
            sleep 2
          done
          if [ "$db_ready" != true ]; then
            echo "Postgres did not become ready within 120 seconds." >&2
            docker compose ps db >&2 || true
            docker compose logs --tail=100 db >&2 || true
            exit 1
          fi
          db_password="$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
          if ! grep -q '^DATABASE_URL=' .env || [[ "$db_password" =~ [^A-Za-z0-9_.~-] ]]; then
            db_password="$(openssl rand -hex 32)"
            docker compose exec -T db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "alter user \"$POSTGRES_USER\" with password '$db_password';" </dev/null
            set_env POSTGRES_PASSWORD "$db_password"
            set_env DATABASE_URL "postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
            export POSTGRES_PASSWORD="$db_password"
            export DATABASE_URL="postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
          fi
          docker compose --profile tools run --rm migrate bun run db:migrate </dev/null
          docker compose --profile tools run --rm migrate bun run db:seed </dev/null
          docker compose --profile scheduler up -d --no-build --remove-orphans app caddy worker-scheduler
          scheduler_ready=false
          for attempt in $(seq 1 12); do
            if docker compose exec -T worker-scheduler sh -c 'true' </dev/null; then
              scheduler_ready=true
              break
            fi
            sleep 5
          done
          if [ "$scheduler_ready" != true ]; then
            echo "worker-scheduler did not become executable within 60 seconds." >&2
            docker compose ps worker-scheduler >&2 || true
            docker compose logs --tail=100 worker-scheduler >&2 || true
            exit 1
          fi
          docker compose ps
          REMOTE

      - name: Smoke production APIs
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' SITE_HOSTS='$SITE_HOSTS' EXPECTED_POSTGRES_MAJOR='17' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          WORKER_TOKEN="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"

          if [ -z "$WORKER_TOKEN" ]; then
