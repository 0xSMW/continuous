name: Deploy

on:
  workflow_dispatch:
    inputs:
      site_hosts:
        description: "Caddy site hosts, for example continuoushq.com, getcontinuous.app"
        required: false
        default: "continuoushq.com, getcontinuous.app"
      app_url:
        description: "Canonical external app URL; omitted values derive from the first site host"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  droplet:
    name: DigitalOcean Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/continuous' }}
      SITE_HOSTS: ${{ inputs.site_hosts }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL || 'admin@continuoushq.com' }}
      APP_URL: ${{ inputs.app_url }}
      REVENUE_WORKER_OPERATOR_EMAIL: ${{ secrets.REVENUE_WORKER_OPERATOR_EMAIL || 'owner@continuoushq.com' }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      DO_FIREWALL_NAME: continuous-fw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST:-}" ]]; then
            echo "::error::Missing DEPLOY_HOST secret."
            exit 1
          fi
          if [[ -z "${DEPLOY_KEY:-}" ]]; then
            echo "::error::Missing DEPLOY_KEY secret."
            exit 1
          fi
          if [[ -z "${DO_API_TOKEN:-}" ]]; then
            echo "::error::Missing DO_API_TOKEN secret."
            exit 1
          fi

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SITE_HOSTS" =~ ^[A-Za-z0-9.,[:space:]-]+$ ]]; then
            echo "::error::site_hosts may only contain hostnames, commas, spaces, dots, and dashes."
            exit 1
          fi
          if [[ -n "${APP_URL:-}" && ! "$APP_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "::error::app_url must be an https URL."
            exit 1
          fi

      - name: Open runner SSH access
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -4 -fsS https://ifconfig.me/ip)"
          firewall_id="$(
            curl -fsS \
              -H "Authorization: Bearer $DO_API_TOKEN" \
              "https://api.digitalocean.com/v2/firewalls" \
              | jq -r --arg name "$DO_FIREWALL_NAME" '.firewalls[] | select(.name == $name) | .id' \
              | head -1
          )"
          if [[ -z "$firewall_id" ]]; then
            echo "::error::Could not find DigitalOcean firewall $DO_FIREWALL_NAME."
            exit 1
          fi

          echo "RUNNER_SSH_CIDR=$runner_ip/32" >> "$GITHUB_ENV"
          echo "DO_FIREWALL_ID=$firewall_id" >> "$GITHUB_ENV"

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$runner_ip/32\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$firewall_id/rules" \
            >/dev/null

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 5 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH did not become reachable from this runner."
          exit 1

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cloud-init status --wait >/dev/null 2>&1 || true; command -v docker >/dev/null; docker compose version >/dev/null; command -v rsync >/dev/null; mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".env" \
            --exclude ".env.*" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Deploy Compose stack
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SITE_HOSTS:-}" || "$SITE_HOSTS" == "http://:80" || "$SITE_HOSTS" == ":80" ]]; then
            SITE_HOSTS="continuoushq.com, getcontinuous.app"
          fi
          if [[ -z "${APP_URL:-}" || "$APP_URL" == http://* ]]; then
            first_host="$(printf '%s' "$SITE_HOSTS" | cut -d, -f1 | xargs)"
            first_host="${first_host#http://}"
            first_host="${first_host#https://}"
            APP_URL="https://$first_host"
          fi
          app_url="${APP_URL:-https://continuoushq.com}"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' SITE_HOSTS='$SITE_HOSTS' ACME_EMAIL='$ACME_EMAIL' APP_URL='$app_url' REVENUE_WORKER_OPERATOR_EMAIL='$REVENUE_WORKER_OPERATOR_EMAIL' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          if [ ! -f .env ]; then
            password="$(openssl rand -hex 32)"
            umask 077
            {
              printf 'POSTGRES_DB=continuous\n'
              printf 'POSTGRES_USER=continuous\n'
              printf 'POSTGRES_PASSWORD=%s\n' "$password"
              printf 'DATABASE_URL=postgresql://continuous:%s@db:5432/continuous\n' "$password"
              printf 'APP_ENV=production\n'
              printf 'APP_URL=%s\n' "$APP_URL"
              printf 'SITE_HOSTS=%s\n' "$SITE_HOSTS"
              printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL"
              printf 'APP_IMAGE=continuous-app\n'
              printf 'APP_TAG=local\n'
              printf 'REVENUE_WORKER_RUN_ENABLED=true\n'
              printf 'REVENUE_WORKER_RUN_TOKEN=%s\n' "$(openssl rand -hex 32)"
              printf 'REVENUE_WORKER_OPERATOR_EMAIL=%s\n' "$REVENUE_WORKER_OPERATOR_EMAIL"
            } > .env
          fi
          set_env() {
            key="$1"
            value="$2"
            tmp="$(mktemp)"
            if grep -q "^${key}=" .env; then
              awk -v key="$key" -v value="$value" '
                index($0, key "=") == 1 { print key "=" value; next }
                { print }
              ' .env > "$tmp"
            else
              cat .env > "$tmp"
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
            fi
            mv "$tmp" .env
            chmod 600 .env
          }
          set_env APP_URL "$APP_URL"
          set_env SITE_HOSTS "$SITE_HOSTS"
          set_env ACME_EMAIL "$ACME_EMAIL"
          set_env REVENUE_WORKER_OPERATOR_EMAIL "$REVENUE_WORKER_OPERATOR_EMAIL"
          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          export POSTGRES_USER POSTGRES_DB
          worker_token="$(grep '^REVENUE_WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"
          if [ -z "$worker_token" ]; then
            worker_token="$(openssl rand -hex 32)"
            set_env REVENUE_WORKER_RUN_TOKEN "$worker_token"
          fi
          set_env REVENUE_WORKER_RUN_ENABLED true
          docker compose pull db caddy
          docker compose up -d db
          docker compose exec -T db sh -c 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 1; done' </dev/null
          db_password="$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
          if ! grep -q '^DATABASE_URL=' .env || [[ "$db_password" =~ [^A-Za-z0-9_.~-] ]]; then
            db_password="$(openssl rand -hex 32)"
            docker compose exec -T db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "alter user \"$POSTGRES_USER\" with password '$db_password';" </dev/null
            set_env POSTGRES_PASSWORD "$db_password"
            set_env DATABASE_URL "postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
            export POSTGRES_PASSWORD="$db_password"
            export DATABASE_URL="postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
          fi
          docker compose --profile tools run --rm --build migrate bun run db:migrate </dev/null
          docker compose --profile tools run --rm --build migrate bun run db:seed </dev/null
          docker compose up -d --build --remove-orphans app caddy
          docker compose ps
          REMOTE

      - name: Smoke production worker API
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          WORKER_TOKEN="$(grep '^REVENUE_WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"

          if [ -z "$WORKER_TOKEN" ]; then
            echo "Missing REVENUE_WORKER_RUN_TOKEN in $APP_DIR/.env." >&2
            exit 1
          fi

          psql_db() {
            docker compose exec -T db psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" "$@"
          }

          IDS="$(psql_db -At <<'SQL'
          with base as (
            select tenant_id, id as connection_id
            from connections
            where state='active'
            order by created_at
            limit 1
          ),
          ids as (
            select gen_random_uuid() as run_id, gen_random_uuid() as action_id from base
          ),
          inserted_run as (
            insert into adapter_runs (
              id, tenant_id, connection_id, mode, operation, idempotency_key, state,
              attempt, max_attempts, reconciliation_state, read_count, write_count,
              receipt, data, started_at
            )
            select ids.run_id, base.tenant_id, base.connection_id, 'dry_run',
                   'deploy_reconciliation_smoke', 'deploy-reconcile-' || ids.run_id::text || ':run',
                   'running', 1, 3, 'pending', 1, 0, '{}'::jsonb,
                   '{"dryRun":true,"externalMutation":false}'::jsonb, now()
            from base, ids
            returning id
          ),
          inserted_action as (
            insert into adapter_actions (
              id, tenant_id, connection_id, adapter_run_id, idempotency_key, state,
              mode, operation, attempt, max_attempts, reconciliation_state,
              request, response, receipt
            )
            select ids.action_id, base.tenant_id, base.connection_id, ids.run_id,
                   'deploy-reconcile-' || ids.action_id::text || ':action',
                   'done', 'dry_run', 'deploy_reconciliation_smoke', 1, 3, 'pending',
                   '{"dryRun":true,"externalSend":false}'::jsonb,
                   '{"status":"prepared"}'::jsonb,
                   '{"externalMutation":false}'::jsonb
            from base, ids
            returning id
          )
          select ids.run_id || '|' || ids.action_id from ids;
          SQL
          )"

          if [ -z "$IDS" ]; then
            echo "No active adapter connection is available for the production smoke." >&2
            exit 1
          fi

          RUN_ID="${IDS%%|*}"
          ACTION_ID="${IDS##*|}"
          RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/worker \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d '{"command":"adapters.reconcile","worker":{"role":"revenue_operations","tenantSlug":"continuous-demo"},"config":{"limit":25}}'
          )"

          echo "$RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "adapters.reconcile" and (.data.result.processed >= 2) and (.data.result.matched >= 2)' \
            >/dev/null

          psql_db -At <<SQL
          select 'adapter_run' as kind, state, reconciliation_state, coalesce(receipt->>'externalMutation','') as external_mutation
          from adapter_runs where id = '$RUN_ID'::uuid;
          select 'adapter_action' as kind, state, reconciliation_state, coalesce(receipt->>'externalMutation','') as external_mutation
          from adapter_actions where id = '$ACTION_ID'::uuid;
          select 'proof_counts' as kind,
            (select count(*) from audit_events where source='continuous.adapter_reconciliation' and data->>'operation'='deploy_reconciliation_smoke')::text,
            (select count(*) from evidence where data->>'operation'='deploy_reconciliation_smoke')::text;
          SQL
          REMOTE

      - name: Close runner SSH access
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DO_FIREWALL_ID:-}" || -z "${RUNNER_SSH_CIDR:-}" || -z "${DO_API_TOKEN:-}" ]]; then
            exit 0
          fi

          curl -fsS \
            -X DELETE \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$RUNNER_SSH_CIDR\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$DO_FIREWALL_ID/rules" \
            >/dev/null || true
