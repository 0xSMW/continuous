name: Deploy

on:
  workflow_dispatch:
    inputs:
      site_hosts:
        description: "Caddy site hosts, for example continuoushq.com, getcontinuous.app"
        required: false
        default: "continuoushq.com, getcontinuous.app"
      app_url:
        description: "Canonical external app URL; omitted values derive from the first site host"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  droplet:
    name: DigitalOcean Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/continuous' }}
      SITE_HOSTS: ${{ inputs.site_hosts }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL || 'admin@continuoushq.com' }}
      APP_URL: ${{ inputs.app_url }}
      WORKER_OPERATOR_EMAIL: ${{ secrets.WORKER_OPERATOR_EMAIL || 'owner@continuoushq.com' }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      DO_FIREWALL_NAME: continuous-fw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST:-}" ]]; then
            echo "::error::Missing DEPLOY_HOST secret."
            exit 1
          fi
          if [[ -z "${DEPLOY_KEY:-}" ]]; then
            echo "::error::Missing DEPLOY_KEY secret."
            exit 1
          fi
          if [[ -z "${DO_API_TOKEN:-}" ]]; then
            echo "::error::Missing DO_API_TOKEN secret."
            exit 1
          fi

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SITE_HOSTS" =~ ^[A-Za-z0-9.,[:space:]-]+$ ]]; then
            echo "::error::site_hosts may only contain hostnames, commas, spaces, dots, and dashes."
            exit 1
          fi
          if [[ -n "${APP_URL:-}" && ! "$APP_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "::error::app_url must be an https URL."
            exit 1
          fi

      - name: Open runner SSH access
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -4 -fsS https://ifconfig.me/ip)"
          firewall_id="$(
            curl -fsS \
              -H "Authorization: Bearer $DO_API_TOKEN" \
              "https://api.digitalocean.com/v2/firewalls" \
              | jq -r --arg name "$DO_FIREWALL_NAME" '.firewalls[] | select(.name == $name) | .id' \
              | head -1
          )"
          if [[ -z "$firewall_id" ]]; then
            echo "::error::Could not find DigitalOcean firewall $DO_FIREWALL_NAME."
            exit 1
          fi

          echo "RUNNER_SSH_CIDR=$runner_ip/32" >> "$GITHUB_ENV"
          echo "DO_FIREWALL_ID=$firewall_id" >> "$GITHUB_ENV"

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$runner_ip/32\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$firewall_id/rules" \
            >/dev/null

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 5 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH did not become reachable from this runner."
          exit 1

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cloud-init status --wait >/dev/null 2>&1 || true; command -v docker >/dev/null; docker compose version >/dev/null; command -v rsync >/dev/null; mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".env" \
            --exclude ".env.*" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Deploy Compose stack
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SITE_HOSTS:-}" || "$SITE_HOSTS" == "http://:80" || "$SITE_HOSTS" == ":80" ]]; then
            SITE_HOSTS="continuoushq.com, getcontinuous.app"
          fi
          if [[ -z "${APP_URL:-}" || "$APP_URL" == http://* ]]; then
            first_host="$(printf '%s' "$SITE_HOSTS" | cut -d, -f1 | xargs)"
            first_host="${first_host#http://}"
            first_host="${first_host#https://}"
            APP_URL="https://$first_host"
          fi
          app_url="${APP_URL:-https://continuoushq.com}"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' SITE_HOSTS='$SITE_HOSTS' ACME_EMAIL='$ACME_EMAIL' APP_URL='$app_url' WORKER_OPERATOR_EMAIL='$WORKER_OPERATOR_EMAIL' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          if [ ! -f .env ]; then
            password="$(openssl rand -hex 32)"
            umask 077
            {
              printf 'POSTGRES_DB=continuous\n'
              printf 'POSTGRES_USER=continuous\n'
              printf 'POSTGRES_PASSWORD=%s\n' "$password"
              printf 'DATABASE_URL=postgresql://continuous:%s@db:5432/continuous\n' "$password"
              printf 'APP_ENV=production\n'
              printf 'APP_URL=%s\n' "$APP_URL"
              printf 'SITE_HOSTS=%s\n' "$SITE_HOSTS"
              printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL"
              printf 'APP_IMAGE=continuous-app\n'
              printf 'APP_TAG=local\n'
              printf 'WORKER_RUN_ENABLED=true\n'
              printf 'WORKER_RUN_TOKEN=%s\n' "$(openssl rand -hex 32)"
              printf 'WORKER_OPERATOR_EMAIL=%s\n' "$WORKER_OPERATOR_EMAIL"
            } > .env
          fi
          set_env() {
            key="$1"
            value="$2"
            tmp="$(mktemp)"
            if grep -q "^${key}=" .env; then
              awk -v key="$key" -v value="$value" '
                index($0, key "=") == 1 { print key "=" value; next }
                { print }
              ' .env > "$tmp"
            else
              cat .env > "$tmp"
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
            fi
            mv "$tmp" .env
            chmod 600 .env
          }
          set_env APP_URL "$APP_URL"
          set_env SITE_HOSTS "$SITE_HOSTS"
          set_env ACME_EMAIL "$ACME_EMAIL"
          set_env WORKER_OPERATOR_EMAIL "$WORKER_OPERATOR_EMAIL"
          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          export POSTGRES_USER POSTGRES_DB
          worker_token="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"
          if [ -z "$worker_token" ]; then
            worker_token="$(openssl rand -hex 32)"
          fi
          set_env WORKER_RUN_TOKEN "$worker_token"
          set_env WORKER_RUN_ENABLED true
          docker compose pull db caddy
          docker compose up -d db
          docker compose exec -T db sh -c 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 1; done' </dev/null
          db_password="$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
          if ! grep -q '^DATABASE_URL=' .env || [[ "$db_password" =~ [^A-Za-z0-9_.~-] ]]; then
            db_password="$(openssl rand -hex 32)"
            docker compose exec -T db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "alter user \"$POSTGRES_USER\" with password '$db_password';" </dev/null
            set_env POSTGRES_PASSWORD "$db_password"
            set_env DATABASE_URL "postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
            export POSTGRES_PASSWORD="$db_password"
            export DATABASE_URL="postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
          fi
          docker compose --profile tools run --rm --build migrate bun run db:migrate </dev/null
          docker compose --profile tools run --rm --build migrate bun run db:seed </dev/null
          docker compose up -d --build --remove-orphans app caddy
          docker compose ps
          REMOTE

      - name: Smoke production APIs
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          WORKER_TOKEN="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"

          if [ -z "$WORKER_TOKEN" ]; then
            echo "Missing WORKER_RUN_TOKEN in $APP_DIR/.env." >&2
            exit 1
          fi

          psql_db() {
            docker compose exec -T db psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" "$@"
          }

          SCHEMA="$(docker compose --profile tools run --rm migrate bun run worker:tool schema </dev/null)"
          echo "$SCHEMA" | /usr/bin/jq -c '{commands:.registry.commands, views:.registry.views, tools:[.tools[].name]}'
          echo "$SCHEMA" | /usr/bin/jq -e '
            (.registry.commands | map(.name) | index("run")) != null and
            (.registry.commands | map(.name) | index("continue")) != null and
            (.registry.commands | map(.name) | index("approval.decide")) != null and
            (.registry.commands | map(.name) | index("adapters.reconcile")) != null and
            (.registry.views | map(.name) | index("snapshot")) != null and
            (.registry.views | map(.name) | index("approvals")) != null and
            (.registry.commands | any(.name == "run" and .idempotency == "required")) and
            (.registry.commands | any(.name == "continue" and .idempotency == "required")) and
            (.registry.commands | any(.name == "adapters.reconcile" and .requiresTenant == true)) and
            (.tools | map(.name) | index("worker.run")) != null and
            (.tools | map(.name) | index("worker.continue")) != null and
            (.tools | map(.name) | index("worker.adapters.reconcile")) != null
          ' >/dev/null

          IDS="$(psql_db -At <<'SQL'
          with base as (
            select tenant_id, id as connection_id
            from connections
            where state='active'
            order by created_at
            limit 1
          ),
          ids as (
            select gen_random_uuid() as run_id, gen_random_uuid() as action_id from base
          ),
          inserted_run as (
            insert into adapter_runs (
              id, tenant_id, connection_id, mode, operation, idempotency_key, state,
              attempt, max_attempts, reconciliation_state, read_count, write_count,
              receipt, data, started_at
            )
            select ids.run_id, base.tenant_id, base.connection_id, 'dry_run',
                   'deploy_reconciliation_smoke', 'deploy-reconcile-' || ids.run_id::text || ':run',
                   'running', 1, 3, 'pending', 1, 0, '{}'::jsonb,
                   '{"dryRun":true,"externalMutation":false}'::jsonb, now()
            from base, ids
            returning id
          ),
          inserted_action as (
            insert into adapter_actions (
              id, tenant_id, connection_id, adapter_run_id, idempotency_key, state,
              mode, operation, attempt, max_attempts, reconciliation_state,
              request, response, receipt
            )
            select ids.action_id, base.tenant_id, base.connection_id, ids.run_id,
                   'deploy-reconcile-' || ids.action_id::text || ':action',
                   'done', 'dry_run', 'deploy_reconciliation_smoke', 1, 3, 'pending',
                   '{"dryRun":true,"externalSend":false}'::jsonb,
                   '{"status":"prepared"}'::jsonb,
                   '{"externalMutation":false}'::jsonb
            from base, ids
            returning id
          )
          select ids.run_id || '|' || ids.action_id from ids;
          SQL
          )"

          if [ -z "$IDS" ]; then
            echo "No active adapter connection is available for the production smoke." >&2
            exit 1
          fi

          RUN_ID="${IDS%%|*}"
          ACTION_ID="${IDS##*|}"
          RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/worker \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d '{"command":"adapters.reconcile","worker":{"role":"revenue_operations","tenantSlug":"continuous-demo"},"config":{"limit":25}}'
          )"

          echo "$RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "adapters.reconcile" and (.data.result.processed >= 2) and (.data.result.matched >= 2)' \
            >/dev/null

          psql_db -At <<SQL
          select 'adapter_run' as kind, state, reconciliation_state, coalesce(receipt->>'externalMutation','') as external_mutation
          from adapter_runs where id = '$RUN_ID'::uuid;
          select 'adapter_action' as kind, state, reconciliation_state, coalesce(receipt->>'externalMutation','') as external_mutation
          from adapter_actions where id = '$ACTION_ID'::uuid;
          select 'proof_counts' as kind,
            (select count(*) from audit_events where source='continuous.adapter_reconciliation' and data->>'operation'='deploy_reconciliation_smoke')::text,
            (select count(*) from evidence where data->>'operation'='deploy_reconciliation_smoke')::text;
          SQL

          LEAD_SOURCE_EVENT_ID="deploy-smoke:$RUN_ID"
          LEAD_OBJECT_KEY="deploy-lead-object-$RUN_ID"
          LEAD_OBJECT_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$LEAD_OBJECT_KEY" --arg sourceEventId "$LEAD_SOURCE_EVENT_ID" '{
              command: "object.upsert",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                type: "lead",
                name: "Deploy Smoke Customer",
                state: "received",
                source: "deploy_smoke",
                externalId: $sourceEventId,
                data: {
                  source: "deploy_smoke",
                  sourceEventId: $sourceEventId,
                  customerName: "Deploy Smoke Customer",
                  customerIntent: "roof leak inspection",
                  serviceArea: "roofing",
                  urgency: "high",
                  missingFacts: ["preferred_time_window"]
                },
                reason: "Deploy smoke lead intake"
              }
            }'
          )"
          LEAD_OBJECT_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/api/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$LEAD_OBJECT_PAYLOAD"
          )"

          echo "$LEAD_OBJECT_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:{created:.data.result.created,objectId:.data.result.objectId,eventId:.data.result.eventId}}'
          echo "$LEAD_OBJECT_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "object.upsert" and (.data.result.objectId | length > 0)' \
            >/dev/null

          LEAD_OBJECT_ID="$(echo "$LEAD_OBJECT_RESPONSE" | /usr/bin/jq -r '.data.result.objectId')"
          LEAD_EVENT_KEY="deploy-lead-event-$RUN_ID"
          LEAD_EVENT_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$LEAD_EVENT_KEY" --arg objectId "$LEAD_OBJECT_ID" --arg sourceEventId "$LEAD_SOURCE_EVENT_ID" '{
              command: "event.ingest",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                type: "lead.received",
                source: "deploy_smoke",
                objectId: $objectId,
                data: {
                  source: "deploy_smoke",
                  sourceEventId: $sourceEventId,
                  customerName: "Deploy Smoke Customer",
                  customerIntent: "roof leak inspection",
                  serviceArea: "roofing",
                  urgency: "high",
                  missingFacts: ["preferred_time_window"]
                }
              }
            }'
          )"
          LEAD_EVENT_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/api/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$LEAD_EVENT_PAYLOAD"
          )"

          echo "$LEAD_EVENT_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$LEAD_EVENT_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "event.ingest" and (.data.result.eventId | length > 0)' \
            >/dev/null

          LEAD_EVENT_ID="$(echo "$LEAD_EVENT_RESPONSE" | /usr/bin/jq -r '.data.result.eventId')"
          LEAD_EVIDENCE_KEY="deploy-lead-evidence-$RUN_ID"
          LEAD_EVIDENCE_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$LEAD_EVIDENCE_KEY" --arg objectId "$LEAD_OBJECT_ID" --arg eventId "$LEAD_EVENT_ID" --arg sourceEventId "$LEAD_SOURCE_EVENT_ID" '{
              command: "evidence.attach",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                kind: "snapshot",
                name: "Deploy smoke lead intake snapshot",
                objectId: $objectId,
                eventId: $eventId,
                data: {
                  source: "deploy_smoke",
                  sourceEventId: $sourceEventId,
                  customerName: "Deploy Smoke Customer",
                  customerIntent: "roof leak inspection",
                  serviceArea: "roofing",
                  urgency: "high",
                  missingFacts: ["preferred_time_window"],
                  raw: {form: "deploy_smoke"}
                }
              }
            }'
          )"
          LEAD_EVIDENCE_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/api/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$LEAD_EVIDENCE_PAYLOAD"
          )"

          echo "$LEAD_EVIDENCE_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$LEAD_EVIDENCE_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "evidence.attach" and (.data.result.evidenceId | length > 0)' \
            >/dev/null

          LEAD_EVIDENCE_ID="$(echo "$LEAD_EVIDENCE_RESPONSE" | /usr/bin/jq -r '.data.result.evidenceId')"
          WORKER_RUN_KEY="deploy-worker-run-$RUN_ID"
          WORKER_RUN_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$WORKER_RUN_KEY" --arg objectId "$LEAD_OBJECT_ID" --arg eventId "$LEAD_EVENT_ID" --arg evidenceId "$LEAD_EVIDENCE_ID" '{
              command: "run",
              worker: {role: "revenue_operations", tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                intake: {
                  objectId: $objectId,
                  eventId: $eventId,
                  evidenceId: $evidenceId
                }
              }
            }'
          )"
          WORKER_RUN_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/worker \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$WORKER_RUN_PAYLOAD"
          )"

          echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:{created:.data.result.created,workerRunId:.data.result.workerRunId,eventId:.data.result.eventId,workflowRunId:.data.result.workflowRunId,workflowStepCount:(.data.result.workflowStepIds | length),sourceSnapshotEvidenceId:.data.result.sourceSnapshotEvidenceId,sourceObjectId:.data.result.output.sourceObjectId,sourceEventRowId:.data.result.output.sourceEventRowId,sourceEvidenceId:.data.result.output.sourceEvidenceId,externalSend:.data.result.output.externalSend,classification:.data.result.output.classification}}'
          echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -e \
            --arg objectId "$LEAD_OBJECT_ID" \
            --arg eventId "$LEAD_EVENT_ID" \
            --arg evidenceId "$LEAD_EVIDENCE_ID" \
            '.error == null and .data.command == "run" and .data.result.created == true and (.data.result.workerRunId | length > 0) and (.data.result.eventId | length > 0) and (.data.result.workflowRunId | length > 0) and (.data.result.workflowStepIds | length) == 4 and (.data.result.sourceSnapshotEvidenceId | length > 0) and .data.result.output.externalSend == false and .data.result.output.classification == "quote_ready_for_owner_approval" and .data.result.output.sourceObjectId == $objectId and .data.result.output.sourceEventRowId == $eventId and .data.result.output.sourceEvidenceId == $evidenceId and .data.result.output.workflowRunId == .data.result.workflowRunId and .data.result.snapshot.controls.externalExecution == "disabled"' \
            >/dev/null

          WORKER_RUN_ID="$(echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -r '.data.result.workerRunId')"
          WORKER_EVENT_ID="$(echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -r '.data.result.eventId')"
          SOURCE_SNAPSHOT_ID="$(echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -r '.data.result.sourceSnapshotEvidenceId')"
          WORKER_APPROVAL_ID="$(echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -r '.data.result.approvalRequestId')"
          WORKFLOW_RUN_ID="$(echo "$WORKER_RUN_RESPONSE" | /usr/bin/jq -r '.data.result.workflowRunId')"

          psql_db -At <<SQL
          select 'worker_run' as kind, state, source, data->'output'->>'externalSend'
          from worker_runs where id = '$WORKER_RUN_ID'::uuid;
          select 'worker_event' as kind, type, source
          from events where id = '$WORKER_EVENT_ID'::uuid;
          select 'source_snapshot' as kind, kind, name, data->>'externalSend', data->>'sourceObjectId', data->>'sourceEventRowId', data->>'sourceEvidenceId'
          from evidence where id = '$SOURCE_SNAPSHOT_ID'::uuid;
          select 'revenue_workflow' as kind, state, data->>'workerRunId', data->>'approvalRequestId'
          from workflow_runs where id = '$WORKFLOW_RUN_ID'::uuid;
          select 'revenue_workflow_steps' as kind, count(*)::text
          from workflow_steps where workflow_run_id = '$WORKFLOW_RUN_ID'::uuid;
          SQL

          WORKFLOW_ROW="$(psql_db -Atc "select state || '|' || coalesce(data->>'workerRunId','') || '|' || coalesce(data->>'approvalRequestId','') from workflow_runs where id = '$WORKFLOW_RUN_ID'::uuid;")"
          if [ "$WORKFLOW_ROW" != "approval_requested|$WORKER_RUN_ID|$WORKER_APPROVAL_ID" ]; then
            echo "Unexpected revenue workflow row: $WORKFLOW_ROW" >&2
            exit 1
          fi

          WORKFLOW_STEP_COUNT="$(psql_db -Atc "select count(*)::text from workflow_steps where workflow_run_id = '$WORKFLOW_RUN_ID'::uuid;")"
          if [ "$WORKFLOW_STEP_COUNT" != "4" ]; then
            echo "Expected 4 revenue workflow steps, got $WORKFLOW_STEP_COUNT." >&2
            exit 1
          fi

          WORKER_APPROVAL_DECISION_PAYLOAD="$(
            /usr/bin/jq -nc --arg approvalId "$WORKER_APPROVAL_ID" '{
              command: "approval.decide",
              worker: {role: "revenue_operations", tenantSlug: "continuous-demo"},
              config: {
                approvalId: $approvalId,
                action: "approved",
                note: "Deploy smoke approval continuation; external execution remains blocked."
              }
            }'
          )"
          WORKER_APPROVAL_DECISION_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/worker \
