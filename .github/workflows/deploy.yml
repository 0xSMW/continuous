          APPROVAL_INBOX_PAYLOAD='{"view":"inbox","approval":{"tenantSlug":"continuous-demo","subject":"core"},"config":{}}'
          APPROVAL_INBOX_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/approval \
