name: Deploy

on:
  workflow_dispatch:
    inputs:
      site_hosts:
        description: "Caddy site hosts, for example continuoushq.com, getcontinuous.app"
        required: false
        default: "continuoushq.com, getcontinuous.app"
      app_url:
        description: "Canonical external app URL; omitted values derive from the first site host"
        required: false
        default: ""
      app_tag:
        description: "Release image tag to deploy; omitted values use sha-<current commit>"
        required: false
        default: ""
      rollback_app_tag:
        description: "Existing image tag to roll app services back to without running migrations"
        required: false
        default: ""
      require_production_readiness:
        description: "Run the strict customer-data readiness gate after deploy smoke"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  droplet:
    name: DigitalOcean Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/continuous' }}
      SITE_HOSTS: ${{ inputs.site_hosts }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL || 'admin@continuoushq.com' }}
      APP_URL: ${{ inputs.app_url }}
      APP_TAG_INPUT: ${{ inputs.app_tag }}
      ROLLBACK_APP_TAG: ${{ inputs.rollback_app_tag }}
      REQUIRE_PRODUCTION_READINESS: ${{ inputs.require_production_readiness }}
      WORKER_OPERATOR_EMAIL: ${{ secrets.WORKER_OPERATOR_EMAIL || 'owner@continuoushq.com' }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      DO_FIREWALL_NAME: continuous-fw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST:-}" ]]; then
            echo "::error::Missing DEPLOY_HOST secret."
            exit 1
          fi
          if [[ -z "${DEPLOY_KEY:-}" ]]; then
            echo "::error::Missing DEPLOY_KEY secret."
            exit 1
          fi
          if [[ -z "${DO_API_TOKEN:-}" ]]; then
            echo "::error::Missing DO_API_TOKEN secret."
            exit 1
          fi

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SITE_HOSTS" =~ ^[A-Za-z0-9.,[:space:]-]+$ ]]; then
            echo "::error::site_hosts may only contain hostnames, commas, spaces, dots, and dashes."
            exit 1
          fi
          if [[ -n "${APP_URL:-}" && ! "$APP_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "::error::app_url must be an https URL."
            exit 1
          fi
          if [[ -n "${APP_TAG_INPUT:-}" && ! "$APP_TAG_INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::app_tag may only contain letters, numbers, dot, underscore, or dash."
            exit 1
          fi
          if [[ -n "${ROLLBACK_APP_TAG:-}" && ! "$ROLLBACK_APP_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::rollback_app_tag may only contain letters, numbers, dot, underscore, or dash."
            exit 1
          fi
          if [[ "$REQUIRE_PRODUCTION_READINESS" != "true" && "$REQUIRE_PRODUCTION_READINESS" != "false" ]]; then
            echo "::error::require_production_readiness must be true or false."
            exit 1
          fi

      - name: Open runner SSH access
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -4 -fsS https://ifconfig.me/ip)"
          firewall_id="$(
            curl -fsS \
              -H "Authorization: Bearer $DO_API_TOKEN" \
              "https://api.digitalocean.com/v2/firewalls" \
              | jq -r --arg name "$DO_FIREWALL_NAME" '.firewalls[] | select(.name == $name) | .id' \
              | head -1
          )"
          if [[ -z "$firewall_id" ]]; then
            echo "::error::Could not find DigitalOcean firewall $DO_FIREWALL_NAME."
            exit 1
          fi

          echo "RUNNER_SSH_CIDR=$runner_ip/32" >> "$GITHUB_ENV"
          echo "DO_FIREWALL_ID=$firewall_id" >> "$GITHUB_ENV"

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$runner_ip/32\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$firewall_id/rules" \
            >/dev/null

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 5 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH did not become reachable from this runner."
          exit 1

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cloud-init status --wait >/dev/null 2>&1 || true; command -v docker >/dev/null; docker compose version >/dev/null; command -v rsync >/dev/null; mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "/backups/" \
            --exclude "/logs/" \
            --exclude "/reports/recovery-drills/" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Deploy Compose stack
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SITE_HOSTS:-}" || "$SITE_HOSTS" == "http://:80" || "$SITE_HOSTS" == ":80" ]]; then
            SITE_HOSTS="continuoushq.com, getcontinuous.app"
          fi
          if [[ -z "${APP_URL:-}" || "$APP_URL" == http://* ]]; then
            first_host="$(printf '%s' "$SITE_HOSTS" | cut -d, -f1 | xargs)"
            first_host="${first_host#http://}"
            first_host="${first_host#https://}"
            APP_URL="https://$first_host"
          fi
          app_url="${APP_URL:-https://continuoushq.com}"
          app_tag="${APP_TAG_INPUT:-sha-${GITHUB_SHA::12}}"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' SITE_HOSTS='$SITE_HOSTS' ACME_EMAIL='$ACME_EMAIL' APP_URL='$app_url' WORKER_OPERATOR_EMAIL='$WORKER_OPERATOR_EMAIL' APP_IMAGE='continuous-app' APP_TAG='$app_tag' ROLLBACK_APP_TAG='$ROLLBACK_APP_TAG' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          install -m 0755 -d logs/caddy logs/observability
          if [ -n "${ROLLBACK_APP_TAG:-}" ] && [ ! -f .env ]; then
            echo "Missing $APP_DIR/.env; cannot roll back app services." >&2
            exit 1
          fi

          if [ ! -f .env ]; then
            password="$(openssl rand -hex 32)"
            umask 077
            {
              printf 'POSTGRES_DB=continuous\n'
              printf 'POSTGRES_USER=continuous\n'
              printf 'POSTGRES_PASSWORD=%s\n' "$password"
              printf 'DATABASE_URL=postgresql://continuous:%s@db:5432/continuous\n' "$password"
              printf 'APP_ENV=production\n'
              printf 'APP_URL=%s\n' "$APP_URL"
              printf 'SITE_HOSTS=%s\n' "$SITE_HOSTS"
              printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL"
              printf 'APP_IMAGE=%s\n' "$APP_IMAGE"
              printf 'APP_TAG=%s\n' "$APP_TAG"
              printf 'WORKER_RUN_ENABLED=true\n'
              printf 'WORKER_RUN_TOKEN=%s\n' "$(openssl rand -hex 32)"
              printf 'WORKER_OPERATOR_EMAIL=%s\n' "$WORKER_OPERATOR_EMAIL"
              printf 'CONTROL_PLANE_ALLOWED_TENANTS=continuous-demo\n'
              printf 'CONTROL_PLANE_ALLOWED_WORKER_ROLES=revenue_operations,owner_chief_of_staff,dispatch_operations,finance_operations\n'
              printf 'WORKER_SCHEDULER_ENABLED=true\n'
              printf 'WORKER_SCHEDULER_BASE_URL=http://app:3000\n'
              printf 'WORKER_SCHEDULER_TENANT_SLUG=continuous-demo\n'
              printf 'WORKER_SCHEDULER_LEAD_POLL_LIMIT=5\n'
            } > .env
          fi
          set_env() {
            key="$1"
            value="$2"
            tmp="$(mktemp)"
            if grep -q "^${key}=" .env; then
              awk -v key="$key" -v value="$value" '
                index($0, key "=") == 1 { print key "=" value; next }
                { print }
              ' .env > "$tmp"
            else
              cat .env > "$tmp"
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
            fi
            mv "$tmp" .env
            chmod 600 .env
          }
          set_control_plane_token_catalog() {
            token_hash="$(printf '%s' "$worker_token" | sha256sum | awk '{print $1}')"
            allowed_commands='"core:view.summary","core:task.create","core:task.transition","core:object.upsert","core:adapter.upsert","core:connection.upsert","core:connection.health.record","core:object.link","core:event.ingest","core:evidence.attach","core:document.create","core:packet.prepare","core:document.packet.prepare","core:decision.record","core:approval.request","core:adapter.intent.record","core:rule.change.record","core:capability.grant","core:budget.reserve","core:budget.charge","core:budget.release","core:view.publish","core:customer_signal.record","core:payroll.preview.record","core:payroll.preview.packet.prepare","core:control_plane.token_rotation.attest","core:control_plane.credential.upsert","core:control_plane.credential.revoke","core:control_plane.session.review","worker:view.snapshot","worker:view.approvals","worker:view.briefs","worker:view.decisions","worker:view.board","worker:view.exceptions","worker:run","worker:lead.read","worker:lead.classify","worker:response.draft","worker:schedule.propose","worker:customer_update.draft","worker:closeout.prepare","worker:exception.route","worker:invoice.prepare","worker:ar_followup.draft","worker:cash_forecast.generate","worker:continue","worker:approval.decide","worker:adapters.reconcile","worker:adapters.retry","worker:brief.generate","worker:decision_queue.prepare","worker:anomaly.triage","workflow:view.overview","workflow:view.approvals","workflow:start","workflow:transition","workflow:steps.execute","workflow:approval.decide","approval:view.inbox","approval:approval.decide"'
            catalog_json="$(
              printf '[{"id":"bootstrap-operator","tokenSha256":"%s","operatorEmail":"%s","allowedTenants":["continuous-demo"],"allowedWorkerRoles":["revenue_operations","owner_chief_of_staff","dispatch_operations","finance_operations"],"allowedRoutes":["core","worker","workflow","approval"],"allowedAccess":["read","write"],"allowedCommands":[%s]}]' \
                "$token_hash" \
                "$WORKER_OPERATOR_EMAIL" \
                "$allowed_commands"
            )"
            catalog_b64="$(printf '%s' "$catalog_json" | base64 -w0)"

            set_env CONTROL_PLANE_TOKENS_JSON ""
            set_env CONTROL_PLANE_TOKEN_CATALOG_B64 "$catalog_b64"
          }
          if [ -n "${ROLLBACK_APP_TAG:-}" ]; then
            app_image="$(grep '^APP_IMAGE=' .env | cut -d= -f2- || true)"
            app_image="${app_image:-continuous-app}"
            current_app_tag="$(grep '^APP_TAG=' .env | cut -d= -f2- || true)"
            docker image inspect "$app_image:$ROLLBACK_APP_TAG" >/dev/null
            docker image inspect "$app_image:$ROLLBACK_APP_TAG-scheduler" >/dev/null
            if [ -n "$current_app_tag" ] && [ "$current_app_tag" != "$ROLLBACK_APP_TAG" ]; then
              set_env PREVIOUS_APP_TAG "$current_app_tag"
            fi
            set_env APP_IMAGE "$app_image"
            set_env APP_TAG "$ROLLBACK_APP_TAG"
            docker compose --profile scheduler up -d --no-build --no-deps app worker-scheduler
            for attempt in $(seq 1 30); do
              if docker compose exec -T app node -e "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))" </dev/null; then
                docker compose --profile scheduler ps app worker-scheduler
                exit 0
              fi
              sleep 5
            done
            echo "App did not become healthy after rollback to $ROLLBACK_APP_TAG." >&2
            docker compose --profile scheduler ps app worker-scheduler >&2
            exit 1
          fi
          set_env APP_URL "$APP_URL"
          set_env SITE_HOSTS "$SITE_HOSTS"
          set_env ACME_EMAIL "$ACME_EMAIL"
          set_env WORKER_OPERATOR_EMAIL "$WORKER_OPERATOR_EMAIL"
          set_env CONTROL_PLANE_ALLOWED_TENANTS "continuous-demo"
          set_env CONTROL_PLANE_ALLOWED_WORKER_ROLES "revenue_operations,owner_chief_of_staff,dispatch_operations,finance_operations"
          set_env WORKER_SCHEDULER_ENABLED true
          set_env WORKER_SCHEDULER_BASE_URL "http://app:3000"
          set_env WORKER_SCHEDULER_TENANT_SLUG "continuous-demo"
          set_env WORKER_SCHEDULER_LEAD_POLL_LIMIT 5
          current_app_tag="$(grep '^APP_TAG=' .env | cut -d= -f2- || true)"
          set_env APP_IMAGE "$APP_IMAGE"
          if [ -n "$current_app_tag" ] && [ "$current_app_tag" != "$APP_TAG" ]; then
            set_env PREVIOUS_APP_TAG "$current_app_tag"
          fi
          set_env APP_TAG "$APP_TAG"
          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          export POSTGRES_USER POSTGRES_DB
          worker_token="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"
          if [ -z "$worker_token" ]; then
            worker_token="$(openssl rand -hex 32)"
          fi
          set_env WORKER_RUN_TOKEN "$worker_token"
          set_env WORKER_RUN_ENABLED true
          set_control_plane_token_catalog
          docker compose pull db caddy
          docker compose up -d db
          docker compose exec -T db sh -c 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 1; done' </dev/null
          db_password="$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
          if ! grep -q '^DATABASE_URL=' .env || [[ "$db_password" =~ [^A-Za-z0-9_.~-] ]]; then
            db_password="$(openssl rand -hex 32)"
            docker compose exec -T db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "alter user \"$POSTGRES_USER\" with password '$db_password';" </dev/null
            set_env POSTGRES_PASSWORD "$db_password"
            set_env DATABASE_URL "postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
            export POSTGRES_PASSWORD="$db_password"
            export DATABASE_URL="postgresql://$POSTGRES_USER:$db_password@db:5432/$POSTGRES_DB"
          fi
          docker compose --profile tools run --rm --build migrate bun run db:migrate </dev/null
          docker compose --profile tools run --rm --build migrate bun run db:seed </dev/null
          docker compose --profile scheduler up -d --build --remove-orphans app caddy worker-scheduler
          docker compose --profile scheduler ps --status running worker-scheduler | grep -q worker-scheduler
          docker compose ps
          REMOTE

      - name: Smoke production APIs
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d= -f2- || true)"
          POSTGRES_DB="$(grep '^POSTGRES_DB=' .env | cut -d= -f2- || true)"
          POSTGRES_USER="${POSTGRES_USER:-continuous}"
          POSTGRES_DB="${POSTGRES_DB:-continuous}"
          WORKER_TOKEN="$(grep '^WORKER_RUN_TOKEN=' .env | cut -d= -f2- || true)"

          if [ -z "$WORKER_TOKEN" ]; then
            echo "Missing WORKER_RUN_TOKEN in $APP_DIR/.env." >&2
            exit 1
          fi

          if [ -n "${ROLLBACK_APP_TAG:-}" ]; then
            HEALTH_RESPONSE="$(
              curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
                https://continuoushq.com/api/health
            )"
            echo "$HEALTH_RESPONSE" | /usr/bin/jq -c '{service,status,mode,checkedAt}'
            echo "$HEALTH_RESPONSE" | /usr/bin/jq -e '.status == "ok" and .mode == "production"' >/dev/null
            worker_status="$(
              curl -sS --resolve continuoushq.com:443:127.0.0.1 \
                -o /tmp/rollback-worker.out -w '%{http_code}' \
                https://continuoushq.com/worker
            )"
            if [ "$worker_status" != "401" ]; then
              echo "Expected /worker to require auth after rollback; got $worker_status." >&2
              exit 1
            fi
            echo "Rollback smoke passed for app tag $ROLLBACK_APP_TAG."
            exit 0
          fi

          psql_db() {
            docker compose exec -T db psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" "$@"
          }

          SMOKE_RUN_ID="$(date -u +%Y%m%d%H%M%S)"
          CONTROL_PLANE_ATTESTATION_OUTPUT="$(
            APP_DIR="$APP_DIR" \
              CONTROL_PLANE_ATTESTATION_RUN_ID="$SMOKE_RUN_ID" \
              "$APP_DIR/scripts/attest-control-plane-on-host.sh"
          )"
          printf '%s\n' "$CONTROL_PLANE_ATTESTATION_OUTPUT"
          printf '%s\n' "$CONTROL_PLANE_ATTESTATION_OUTPUT" | /usr/bin/jq -e \
            '.control_plane_attestation_status == "ok" and (.credentialId | length > 0) and (.revocationAuditId | length > 0) and (.sessionReviewViewId | length > 0) and (.authSessionId | length > 0)' \
            >/dev/null

          PAYROLL_KEY="deploy-payroll-preview-smoke"
          PAYROLL_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$PAYROLL_KEY" --arg externalId "$PAYROLL_KEY" '{
              command: "payroll.preview.record",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                payrollRunId: "55555555-5555-4555-8555-000000000007",
                statement: {
                  employmentId: "55555555-5555-4555-8555-000000000004",
                  objectId: "33333333-3333-4333-8333-000000000105",
                  externalId: $externalId,
                  state: "draft",
                  grossCents: 336000,
                  netCents: 248640,
                  taxCents: 87360,
                  deductionCents: 0
                },
                lines: [
                  {kind: "earning", code: "regular_hours", amountCents: 336000, taxable: true},
                  {kind: "tax", code: "federal_withholding", amountCents: 87360}
                ],
                liabilities: [
                  {kind: "tax_withholding", payee: "IRS", jurisdiction: "US", amountCents: 87360}
                ],
                trace: {
                  hash: $key,
                  sourceRefs: {payrollRunId: "55555555-5555-4555-8555-000000000007"},
                  inputs: {hours: 80, rateCents: 4200},
                  outputs: {grossCents: 336000, netCents: 248640, taxCents: 87360},
                  rules: {execution: "preview_only"}
                }
              }
            }'
          )"
          PAYROLL_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$PAYROLL_PAYLOAD"
          )"

          echo "$PAYROLL_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:{recorded:.data.result.recorded,statementId:.data.result.statementId,lineCount:(.data.result.lineIds | length),liabilityCount:(.data.result.liabilityIds | length),traceId:.data.result.traceId,evidenceId:.data.result.evidenceId}}'
          echo "$PAYROLL_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "payroll.preview.record" and (.data.result.recorded | type) == "boolean" and (.data.result.statementId | length > 0) and (.data.result.lineIds | length) == 2 and (.data.result.liabilityIds | length) == 1 and (.data.result.traceId | length > 0) and (.data.result.evidenceId | length > 0)' \
            >/dev/null

          PAYROLL_PACKET_KEY="deploy-payroll-preview-packet-smoke-$SMOKE_RUN_ID"
          PAYROLL_PACKET_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$PAYROLL_PACKET_KEY" '{
              command: "payroll.preview.packet.prepare",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                payrollRunId: "55555555-5555-4555-8555-000000000007",
                objectId: "33333333-3333-4333-8333-000000000105",
                variance: {source: "deploy_smoke"},
                data: {source: "deploy_smoke"}
              }
            }'
          )"
          PAYROLL_PACKET_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$PAYROLL_PACKET_PAYLOAD"
          )"

          echo "$PAYROLL_PACKET_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:{prepared:.data.result.prepared,packetId:.data.result.packetId,packetDocumentId:.data.result.packetDocumentId,varianceDocumentId:.data.result.varianceDocumentId,payStatementDocumentCount:(.data.result.payStatementDocumentIds | length),paymentInstructionCount:(.data.result.paymentInstructionIds | length),filingDraftId:.data.result.filingDraftId,approvalRequestId:.data.result.approvalRequestId,evidenceId:.data.result.evidenceId,externalExecution:.data.result.externalExecution}}'
          echo "$PAYROLL_PACKET_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "payroll.preview.packet.prepare" and (.data.result.prepared | type) == "boolean" and (.data.result.packetId | length > 0) and (.data.result.packetDocumentId | length > 0) and (.data.result.varianceDocumentId | length > 0) and (.data.result.payStatementDocumentIds | length) >= 1 and (.data.result.paymentInstructionIds | length) == 2 and (.data.result.filingDraftId | length > 0) and (.data.result.approvalRequestId | length > 0) and (.data.result.evidenceId | length > 0) and .data.result.externalExecution == "blocked"' \
            >/dev/null

          PAYROLL_APPROVAL_ID="$(echo "$PAYROLL_PACKET_RESPONSE" | /usr/bin/jq -r '.data.result.approvalRequestId')"
          PAYROLL_APPROVAL_DECISION_PAYLOAD="$(
            /usr/bin/jq -nc --arg approvalId "$PAYROLL_APPROVAL_ID" '{
              command: "approval.decide",
              approval: {
                id: $approvalId,
                tenantSlug: "continuous-demo",
                subject: "core"
              },
              config: {
                action: "approved",
                note: "Deploy smoke payroll preview approval; external execution remains blocked."
              }
            }'
          )"
          PAYROLL_APPROVAL_DECISION_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/approval \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$PAYROLL_APPROVAL_DECISION_PAYLOAD"
          )"

          echo "$PAYROLL_APPROVAL_DECISION_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:{approvalState:.data.result.approval.state,payrollState:.data.result.payrollHandoff.state,draftState:.data.result.payrollHandoff.draftState,externalExecution:.data.result.payrollHandoff.externalExecution,moneyMovement:.data.result.payrollHandoff.moneyMovement,submission:.data.result.payrollHandoff.submission}}'
          echo "$PAYROLL_APPROVAL_DECISION_RESPONSE" | /usr/bin/jq -e \
