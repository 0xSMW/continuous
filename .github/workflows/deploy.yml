          )"

          echo "$CORE_PACKET_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$CORE_PACKET_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "packet.prepare" and .data.result.prepared == true and (.data.result.packetId | length > 0) and (.data.result.documentId | length > 0) and (.data.result.evidenceId | length > 0)' \
            >/dev/null

          CORE_PACKET_ID="$(echo "$CORE_PACKET_RESPONSE" | /usr/bin/jq -r '.data.result.packetId')"
          CORE_PACKET_DOCUMENT_ID="$(echo "$CORE_PACKET_RESPONSE" | /usr/bin/jq -r '.data.result.documentId')"
          CORE_DECISION_KEY="deploy-core-decision-$RUN_ID"
          CORE_DECISION_PAYLOAD="$(
            /usr/bin/jq -nc --arg key "$CORE_DECISION_KEY" --arg eventId "$CORE_INGESTED_EVENT_ID" --arg objectId "$CORE_OBJECT_ID" --arg documentId "$CORE_DOCUMENT_ID" --arg packetId "$CORE_PACKET_ID" '{
              command: "decision.record",
              core: {tenantSlug: "continuous-demo"},
              idempotencyKey: $key,
              config: {
                kind: "notice_routing",
                state: "proposed",
                decision: "owner_review_required",
                rationale: "Deploy smoke record; no external action.",
                eventId: $eventId,
                data: {
                  objectId: $objectId,
                  documentId: $documentId,
                  packetId: $packetId,
                  externalExecution: "blocked"
                }
              }
            }'
          )"
          CORE_DECISION_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$CORE_DECISION_PAYLOAD"
          )"

          echo "$CORE_DECISION_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$CORE_DECISION_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "decision.record" and (.data.result.decisionId | length > 0)' \
            >/dev/null

          CORE_DECISION_ID="$(echo "$CORE_DECISION_RESPONSE" | /usr/bin/jq -r '.data.result.decisionId')"
          CORE_CONNECTION_ID="$(psql_db -Atc "select c.id from connections c inner join tenants t on t.id = c.tenant_id where t.slug = 'continuous-demo' order by c.created_at limit 1;")"
          CORE_RULE_PACK_ID="$(psql_db -Atc "select id from rule_packs where active = true order by created_at limit 1;")"

          if [ -z "$CORE_CONNECTION_ID" ] || [ -z "$CORE_RULE_PACK_ID" ]; then
            echo "Missing connection or rule pack for Core adapter/rule smoke." >&2
            exit 1
          fi

          CORE_ADAPTER_INTENT_KEY="deploy-core-adapter-intent-$RUN_ID"
          CORE_ADAPTER_INTENT_PAYLOAD="$(
            /usr/bin/jq -nc \
              --arg key "$CORE_ADAPTER_INTENT_KEY" \
              --arg connectionId "$CORE_CONNECTION_ID" \
              --arg taskId "$CORE_TASK_ID" \
              --arg eventId "$CORE_INGESTED_EVENT_ID" \
              --arg capabilityId "$CORE_CAPABILITY_ID" \
              --arg objectId "$CORE_OBJECT_ID" '{
                command: "adapter.intent.record",
                core: {tenantSlug: "continuous-demo"},
                idempotencyKey: $key,
                config: {
                  connectionId: $connectionId,
                  taskId: $taskId,
                  eventId: $eventId,
                  capabilityId: $capabilityId,
                  operation: "draft_agency_response",
                  mode: "dry_run",
                  maxAttempts: 2,
                  request: {
                    objectId: $objectId,
                    externalSend: false
                  },
                  data: {
                    source: "deploy_smoke"
                  }
                }
              }'
          )"
          CORE_ADAPTER_INTENT_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$CORE_ADAPTER_INTENT_PAYLOAD"
          )"

          echo "$CORE_ADAPTER_INTENT_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$CORE_ADAPTER_INTENT_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "adapter.intent.record" and .data.result.created == true and (.data.result.adapterRunId | length > 0) and (.data.result.adapterActionId | length > 0) and .data.result.externalExecution == "blocked"' \
            >/dev/null

          CORE_ADAPTER_RUN_ID="$(echo "$CORE_ADAPTER_INTENT_RESPONSE" | /usr/bin/jq -r '.data.result.adapterRunId')"
          CORE_ADAPTER_ACTION_ID="$(echo "$CORE_ADAPTER_INTENT_RESPONSE" | /usr/bin/jq -r '.data.result.adapterActionId')"
          CORE_RULE_CHANGE_KEY="deploy-core-rule-change-$RUN_ID"
          CORE_RULE_CHANGE_PAYLOAD="$(
            /usr/bin/jq -nc \
              --arg key "$CORE_RULE_CHANGE_KEY" \
              --arg rulePackId "$CORE_RULE_PACK_ID" \
              --arg taskId "$CORE_TASK_ID" \
              --arg capabilityId "$CORE_CAPABILITY_ID" \
              --arg objectId "$CORE_OBJECT_ID" '{
                command: "rule.change.record",
                core: {tenantSlug: "continuous-demo"},
                idempotencyKey: $key,
                config: {
                  rulePackId: $rulePackId,
                  taskId: $taskId,
                  capabilityId: $capabilityId,
                  ruleKey: "deploy_smoke.notice_response_window",
                  changeType: "operator_policy_update",
                  title: "Deploy smoke notice response rule change",
                  state: "proposed",
                  decision: "owner_review_required",
                  rationale: "Deploy smoke rule change; no rule pack mutation.",
                  before: {responseWindowDays: 14},
                  after: {responseWindowDays: 10},
                  impact: {objectIds: [$objectId]},
                  data: {source: "deploy_smoke"}
                }
              }'
          )"
          CORE_RULE_CHANGE_RESPONSE="$(
            curl -fsS --resolve continuoushq.com:443:127.0.0.1 \
              -X POST https://continuoushq.com/core \
              -H "authorization: Bearer $WORKER_TOKEN" \
              -H "content-type: application/json" \
              -d "$CORE_RULE_CHANGE_PAYLOAD"
          )"

          echo "$CORE_RULE_CHANGE_RESPONSE" | /usr/bin/jq -c '{api,error,command:.data.command,result:.data.result}'
          echo "$CORE_RULE_CHANGE_RESPONSE" | /usr/bin/jq -e \
            '.error == null and .data.command == "rule.change.record" and .data.result.created == true and (.data.result.objectId | length > 0) and (.data.result.decisionId | length > 0) and .data.result.externalExecution == "blocked"' \
            >/dev/null

          CORE_RULE_CHANGE_OBJECT_ID="$(echo "$CORE_RULE_CHANGE_RESPONSE" | /usr/bin/jq -r '.data.result.objectId')"
          CORE_RULE_CHANGE_DECISION_ID="$(echo "$CORE_RULE_CHANGE_RESPONSE" | /usr/bin/jq -r '.data.result.decisionId')"
          psql_db -At <<SQL
          select 'core_object' as kind, type, state, external_id
          from objects where id = '$CORE_OBJECT_ID'::uuid;
          select 'core_object_link' as kind, type, data->>'externalExecution'
          from object_links where id = '$CORE_LINK_ID'::uuid;
          select 'core_view' as kind, key, version, object_type, task_state::text
          from ui_contracts where id = '$CORE_VIEW_ID'::uuid;
          select 'core_evidence' as kind, kind, name
          from evidence where id = '$CORE_EVIDENCE_ID'::uuid;
          select 'core_document' as kind, kind, state, sensitivity
          from documents where id = '$CORE_DOCUMENT_ID'::uuid;
          select 'core_packet' as kind, kind, state, document_id
          from evidence_packets where id = '$CORE_PACKET_ID'::uuid;
          select 'core_packet_document' as kind, kind, state, sensitivity
          from documents where id = '$CORE_PACKET_DOCUMENT_ID'::uuid;
          select 'core_decision' as kind, kind, state, decision
          from decisions where id = '$CORE_DECISION_ID'::uuid;
          select 'core_adapter_run' as kind, mode, operation, reconciliation_state
          from adapter_runs where id = '$CORE_ADAPTER_RUN_ID'::uuid;
          select 'core_adapter_action' as kind, mode, operation, request->>'externalExecution'
          from adapter_actions where id = '$CORE_ADAPTER_ACTION_ID'::uuid;
          select 'core_rule_change' as kind, type, state, data->>'ruleKey'
          from objects where id = '$CORE_RULE_CHANGE_OBJECT_ID'::uuid;
          select 'core_rule_change_decision' as kind, kind, decision
          from decisions where id = '$CORE_RULE_CHANGE_DECISION_ID'::uuid;
          SQL
          CHECK_SYSTEMD_FAILED=false REQUIRE_BACKUP_FRESH=false ./scripts/check-observability-on-host.sh
          REMOTE

      - name: Close runner SSH access
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DO_FIREWALL_ID:-}" || -z "${RUNNER_SSH_CIDR:-}" || -z "${DO_API_TOKEN:-}" ]]; then
            exit 0
          fi

          curl -fsS \
            -X DELETE \
            -H "Authorization: Bearer $DO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inbound_rules\":[{\"protocol\":\"tcp\",\"ports\":\"22\",\"sources\":{\"addresses\":[\"$RUNNER_SSH_CIDR\"]}}]}" \
            "https://api.digitalocean.com/v2/firewalls/$DO_FIREWALL_ID/rules" \
            >/dev/null || true
